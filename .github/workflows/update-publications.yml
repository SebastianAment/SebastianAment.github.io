name: Update Publications

on:
  schedule:
    # Runs every Monday at 9:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-publications:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Update publications
        run: python update_publications.py
        env:
          S2_API_KEY: ${{ secrets.S2_API_KEY }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add media/publications.json
          [ -f media/citation_history.json ] && git add media/citation_history.json
          git diff --cached --quiet && exit 0
          git commit -m "Auto-update publications from Semantic Scholar"
          git push
